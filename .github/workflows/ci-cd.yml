name: RiskGuard AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Component to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - frontend

permissions:
  contents: read

# Production deployment uses GitHub environments and these secrets:
# AZURE_WEBAPP_PUBLISH_PROFILE
# AZURE_STATIC_WEB_APPS_API_TOKEN
# AZURE_SQL_CONNECTION_STRING (for a separately approved migration step)

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: backend/Directory.Packages.props
      - run: dotnet tool restore
      - run: dotnet restore RiskGuardAI.sln
      - run: dotnet build RiskGuardAI.sln --configuration Release --no-restore
      - run: dotnet test RiskGuardAI.sln --configuration Release --no-build --verbosity normal
      - name: Generate idempotent Azure SQL migration script
        env:
          ASPNETCORE_ENVIRONMENT: Production
          Database__Provider: SqlServer
          SQL_CONNECTION_STRING: Server=localhost;Initial Catalog=RiskGuardBuild;Integrated Security=True;Encrypt=False
          JWT_SECRET: RiskGuard-CI-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
        run: >
          dotnet ef migrations script --idempotent
          --project src/RiskGuard.Persistence.SqlServerMigrations
          --startup-project src/RiskGuard.API
          --context RiskGuardDbContext
          --configuration Release
          --no-build
          --output ../artifacts/sql/riskguard-azure.sql
      - run: dotnet publish src/RiskGuard.API/RiskGuard.API.csproj --configuration Release --no-build --output ../artifacts/api
      - uses: actions/upload-artifact@v7
        with:
          name: riskguard-api
          path: artifacts/api
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: riskguard-azure-sql
          path: artifacts/sql/riskguard-azure.sql
          if-no-files-found: error

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api' }}
      VITE_ENABLE_DEMO_MODE: ${{ vars.VITE_ENABLE_DEMO_MODE || 'false' }}
      VITE_ENABLE_REGISTRATION: ${{ vars.VITE_ENABLE_REGISTRATION || 'false' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: riskguard-web
          path: frontend/dist
          if-no-files-found: error

  containers:
    name: Container validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f backend/src/RiskGuard.API/Dockerfile backend -t riskguard-api:${{ github.sha }}
      - run: docker build --build-arg VITE_API_BASE_URL=/api frontend -t riskguard-web:${{ github.sha }}

  deploy-api:
    name: Deploy API to Azure App Service
    if: github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'all' || inputs.deploy_target == 'api')
    needs: [backend, frontend, containers]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: riskguard-api
          path: api-package
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: api-package

  deploy-frontend:
    name: Deploy frontend to Azure Static Web Apps
    if: github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'all' || inputs.deploy_target == 'frontend')
    needs: [backend, frontend, containers]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: riskguard-web
          path: web-package
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: web-package
          output_location: ''
          skip_app_build: true
