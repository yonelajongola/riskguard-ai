services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - riskguard-sql:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: src/RiskGuard.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Provider: SqlServer
      SQL_CONNECTION_STRING: "Server=sqlserver,1433;Database=RiskGuardAI;User Id=sa;Password=${SQL_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True"
      JWT_SECRET: "${JWT_SECRET}"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Authentication__AllowPublicRegistration: "false"
      SeedData__Enabled: "true"
      Swagger__Enabled: "false"
      AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT:-}"
      AZURE_OPENAI_KEY: "${AZURE_OPENAI_KEY:-}"
      AZURE_OPENAI_DEPLOYMENT: "${AZURE_OPENAI_DEPLOYMENT:-}"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/api/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  riskguard-sql:
